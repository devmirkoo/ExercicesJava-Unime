name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile all Java source files
        run: |
          echo "=== Searching for Java source files ==="
          java_files=$(find . -name "*.java" -not -path "*/.git/*")
          
          if [ -z "$java_files" ]; then
            echo "No Java files found."
            exit 1
          fi
          
          echo "Found Java files:"
          echo "$java_files"
          
          mkdir -p /tmp/java-out
          
          echo "=== Compiling ==="
          # Compile all .java files; each exercise is standalone so compile per-directory
          failed=0
          while IFS= read -r file; do
            dir=$(dirname "$file")
            echo "Compiling: $file"
            if ! javac -d /tmp/java-out "$file" 2>&1; then
              echo "::error file=$file::Compilation failed"
              failed=1
            fi
          done <<< "$java_files"
          
          if [ "$failed" -ne 0 ]; then
            echo "One or more files failed to compile."
            exit 1
          fi
          
          echo "=== All files compiled successfully ==="
